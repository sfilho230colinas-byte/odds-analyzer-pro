  html, body { margin:0; padding:0; background:#0C1310; }

  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {

  .tab-btn { background: transparent; border: none; border-bottom: 3px solid transparent; padding: 8px 4px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em; color: #8CA097; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const F_BODY = "'Inter', system-ui, sans-serif";
const F_MONO = "'IBM Plex Mono', monospace";

const TABS = [

// ---------- icons (inline SVG, no external icon library) ----------
function Icon({ name, size = 16, color = "currentColor", style }) {
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", style };
  switch (name) {
    case "plus": return <svg {...common}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    case "trash": return <svg {...common}><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>;
    case "sparkles": return <svg {...common}><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M19 15l.7 2.1L22 18l-2.3.9L19 21l-.7-2.1L16 18l2.3-.9L19 15z"/></svg>;
    case "wallet": return <svg {...common}><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.4" fill={color}/></svg>;
    case "trendUp": return <svg {...common}><polyline points="3 17 9 11 13 15 21 6"/><polyline points="14 6 21 6 21 13"/></svg>;
    case "alert": return <svg {...common}><path d="M12 3l10 18H2L12 3z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17.3" r="0.6" fill={color}/></svg>;
    case "loader": return <svg {...common}><circle cx="12" cy="12" r="9" opacity="0.25"/><path d="M21 12a9 9 0 0 0-9-9"/></svg>;
    case "info": return <svg {...common}><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.6" fill={color}/></svg>;
    case "chart": return <svg {...common}><line x1="4" y1="20" x2="4" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="20" y1="20" x2="20" y2="14"/></svg>;
    case "target": return <svg {...common}><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6" fill={color}/></svg>;
    default: return null;
  }
}

// ---------- math helpers ----------
function uid() { return Math.random().toString(36).slice(2, 10); }
const FACT = [1];
for (let i = 1; i <= 20; i++) FACT[i] = FACT[i - 1] * i;
function poissonPMF(lambda, k) { return (Math.exp(-lambda) * Math.pow(lambda, k)) / FACT[k]; }

function computeOutcomeProbs(lh, la) {
  const MAX = 9;
  let pHome = 0, pDraw = 0, pAway = 0;
  const scores = [];
  for (let h = 0; h <= MAX; h++) {
    for (let a = 0; a <= MAX; a++) {
      const p = poissonPMF(lh, h) * poissonPMF(la, a);
      scores.push({ h, a, p });
      if (h > a) pHome += p; else if (h === a) pDraw += p; else pAway += p;
    }
  }
  const total = pHome + pDraw + pAway || 1;
  scores.sort((a, b) => b.p - a.p);
  return { pHome: pHome / total, pDraw: pDraw / total, pAway: pAway / total, top3: scores.slice(0, 3).map((s) => ({ ...s, p: s.p / total })) };
}

function computeOddsBoard(bookmakers) {
  const valid = (bookmakers || []).filter((b) => b.name.trim());
  const best = { home: null, draw: null, away: null };
  const rows = valid.map((b) => {
    const oh = parseFloat(b.oddsHome), od = parseFloat(b.oddsDraw), oa = parseFloat(b.oddsAway);
    const allValid = [oh, od, oa].every((v) => v > 1);
    const overround = allValid ? (1 / oh + 1 / od + 1 / oa - 1) * 100 : null;
    [["home", oh], ["draw", od], ["away", oa]].forEach(([key, val]) => {
      if (val > 1 && (!best[key] || val > best[key].value)) best[key] = { value: val, bookmaker: b.name };
    });
    return { ...b, oh, od, oa, overround };
  });
  let arbitrage = null;
  if (best.home && best.draw && best.away) {
    const sumInv = 1 / best.home.value + 1 / best.draw.value + 1 / best.away.value;
    if (sumInv < 1) {
      arbitrage = { isArb: true, profitPct: (1 / sumInv - 1) * 100, alloc: { home: 1 / best.home.value / sumInv, draw: 1 / best.draw.value / sumInv, away: 1 / best.away.value / sumInv } };
    } else {
      arbitrage = { isArb: false, sumInv };
    }
  }
  return { rows, best, arbitrage };
}

function marketFairProbs(best) {
  if (!best.home || !best.draw || !best.away) return null;
  const h = 1 / best.home.value, d = 1 / best.draw.value, a = 1 / best.away.value;
  const sum = h + d + a;
  return { home: h / sum, draw: d / sum, away: a / sum };
}

function kellyStake(bankroll, odds, prob, fraction) {
  if (!(odds > 1) || !(prob > 0) || !(prob < 1) || !(bankroll > 0)) return null;
  const b = odds - 1, q = 1 - prob;
  const fstar = (b * prob - q) / b;
  const applied = Math.max(0, fstar) * fraction;
  return { fstar, applied, stake: bankroll * applied };
}

function money(v) { if (v === null || v === undefined || isNaN(v)) return "—"; return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v); }
function pct(v, d = 1) { if (v === null || v === undefined || isNaN(v)) return "—"; return `${(v * 100).toFixed(d)}%`; }
function pctRaw(v, d = 1) { if (v === null || v === undefined || isNaN(v)) return "—"; return `${v.toFixed(d)}%`; }

function makeMatch() {
  return {
    id: uid(), home: "", away: "",
    bookmakers: [{ id: uid(), name: "", oddsHome: "", oddsDraw: "", oddsAway: "" }],
    stakePool: "1000",
    stats: { homeGF: "", homeGA: "", awayGF: "", awayGA: "", homeAdv: "1.10", awayAdv: "0.95", valueThreshold: "3", compCode: "BSA", homeTeamId: "", awayTeamId: "" },
    bank: { bankroll: "1000", kellyFraction: "0.5", flatPercent: "2", selectedOutcome: "home" },
    aiContext: "", aiAnalysis: "", aiTimestamp: null,
  };
}

// ---------- UI atoms ----------
function Field({ label, children }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", gap: 4, fontFamily: F_BODY }}>
      <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em", color: COLORS.inkMute }}>{label}</span>
      {children}
    </label>
  );
}
const inputStyle = { background: COLORS.bg, border: `1px solid ${COLORS.line}`, borderRadius: 6, color: COLORS.ink, padding: "8px 10px", fontFamily: F_MONO, fontSize: 14, width: "100%" };
function NumInput(props) { return <input {...props} type="number" step="0.01" style={{ ...inputStyle, ...(props.style || {}) }} />; }
function TextInput(props) { return <input {...props} type="text" style={{ ...inputStyle, fontFamily: F_BODY, ...(props.style || {}) }} />; }

function Badge({ children, tone = "mute" }) {
  const toneMap = {
    pitch: { bg: "rgba(63,163,94,0.15)", color: COLORS.pitch, border: COLORS.pitchDim },
    gold: { bg: "rgba(217,164,65,0.15)", color: COLORS.gold, border: COLORS.goldDim },
    alert: { bg: "rgba(196,72,59,0.15)", color: COLORS.alert, border: COLORS.alert },
    mute: { bg: COLORS.surface2, color: COLORS.inkMute, border: COLORS.line },
  };
  const t = toneMap[tone];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, background: t.bg, color: t.color, border: `1px solid ${t.border}`, borderRadius: 999, padding: "2px 10px", fontSize: 11, fontFamily: F_MONO, textTransform: "uppercase", letterSpacing: "0.04em" }}>{children}</span>;
}

function DigitCell({ label, value, tone = "ink", sub }) {
  const color = tone === "gold" ? COLORS.gold : tone === "pitch" ? COLORS.pitch : tone === "alert" ? COLORS.alert : COLORS.ink;
  return (
    <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.line}`, borderRadius: 6, padding: "10px 12px", minWidth: 92, flex: "1 1 92px" }}>
      <div style={{ fontFamily: F_MONO, fontSize: 20, fontWeight: 600, color }}>{value}</div>
      {sub && <div style={{ fontFamily: F_MONO, fontSize: 10, color: COLORS.inkMute, marginTop: 2 }}>{sub}</div>}
      <div style={{ fontFamily: F_BODY, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em", color: COLORS.inkMute, marginTop: 4 }}>{label}</div>
    </div>
  );
}

function OddsBoard({ match, oddsBoard }) {
  const best = oddsBoard.best;
  return (
    <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14, display: "flex", gap: 10, flexWrap: "wrap" }}>
      <DigitCell label={match.home?.trim() || "Casa"} value={best.home ? best.home.value.toFixed(2) : "—"} sub={best.home ? best.home.bookmaker : "sem odd"} tone="pitch" />
      <DigitCell label="Empate" value={best.draw ? best.draw.value.toFixed(2) : "—"} sub={best.draw ? best.draw.bookmaker : "sem odd"} />
      <DigitCell label={match.away?.trim() || "Fora"} value={best.away ? best.away.value.toFixed(2) : "—"} sub={best.away ? best.away.bookmaker : "sem odd"} tone="pitch" />
      <DigitCell label="Arbitragem" value={oddsBoard.arbitrage?.isArb ? `+${oddsBoard.arbitrage.profitPct.toFixed(2)}%` : "não há"} tone={oddsBoard.arbitrage?.isArb ? "gold" : "mute"} />
    </div>
  );
}

// custom comparison bars (replaces a charting library so the file has zero build step)
function CompareBars({ data }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {data.map((d, i) => (
        <div key={i}>
          <div style={{ fontSize: 12, color: COLORS.ink, marginBottom: 6, fontFamily: F_BODY, fontWeight: 600 }}>{d.name}</div>
          {[["Modelo", d.Modelo, COLORS.pitch], ["Mercado", d.Mercado, COLORS.gold]].map(([label, val, color]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <div style={{ width: 58, fontSize: 11, color, fontFamily: F_MONO }}>{label}</div>
              <div style={{ flex: 1, background: COLORS.bg, borderRadius: 4, height: 10, overflow: "hidden", border: `1px solid ${COLORS.line}` }}>
                <div style={{ width: `${Math.min(100, Math.max(0, val))}%`, background: color, height: "100%" }} />
              </div>
              <div style={{ width: 46, fontSize: 11, fontFamily: F_MONO, textAlign: "right" }}>{val}%</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ---------- main app ----------
function OddsAnalyzerPro() {
  const [matches, setMatches] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [tab, setTab] = useState("odds");
  const [loaded, setLoaded] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const [liveSport, setLiveSport] = useState("soccer_brazil_campeonato");
  const [liveEvents, setLiveEvents] = useState([]);
  const [liveLoading, setLiveLoading] = useState(false);
  const [liveError, setLiveError] = useState("");
  const [liveMeta, setLiveMeta] = useState(null);
  const [statsTeams, setStatsTeams] = useState([]);
  const [statsTeamsLoading, setStatsTeamsLoading] = useState(false);
  const [statsTeamsError, setStatsTeamsError] = useState("");
  const [statsFormLoading, setStatsFormLoading] = useState(false);
  const [statsFormError, setStatsFormError] = useState("");
  const [statsDetail, setStatsDetail] = useState(null);
  const didLoad = useRef(false);

  useEffect(() => {
    try {
      const raw = localStorage.getItem("oap-matches");
      const list = raw ? JSON.parse(raw) : [];
      setMatches(list);
      if (list.length) setActiveId(list[0].id);
    } catch (e) { setMatches([]); }
    try {
      const k = localStorage.getItem("oap-api-key");
      if (k) setApiKey(k);
    } catch (e) {}
    setLoaded(true);
    didLoad.current = true;
  }, []);

  useEffect(() => {
    if (!didLoad.current) return;
    try { localStorage.setItem("oap-matches", JSON.stringify(matches)); } catch (e) {}
  }, [matches]);

  function saveApiKey(v) {
    setApiKey(v);
    try { localStorage.setItem("oap-api-key", v); } catch (e) {}
  }

  const activeMatch = matches.find((m) => m.id === activeId) || null;

  function updateMatch(id, patchFn) { setMatches((prev) => prev.map((m) => (m.id === id ? patchFn(m) : m))); }
  function addMatch() { const m = makeMatch(); setMatches((prev) => [...prev, m]); setActiveId(m.id); setTab("odds"); }
  function deleteMatch(id) { setMatches((prev) => { const next = prev.filter((m) => m.id !== id); if (activeId === id) setActiveId(next.length ? next[0].id : null); return next; }); }
  function addBookmaker(matchId) { updateMatch(matchId, (m) => ({ ...m, bookmakers: [...m.bookmakers, { id: uid(), name: "", oddsHome: "", oddsDraw: "", oddsAway: "" }] })); }
  function updateBookmaker(matchId, bkId, field, value) { updateMatch(matchId, (m) => ({ ...m, bookmakers: m.bookmakers.map((b) => (b.id === bkId ? { ...b, [field]: value } : b)) })); }
  function deleteBookmaker(matchId, bkId) { updateMatch(matchId, (m) => ({ ...m, bookmakers: m.bookmakers.filter((b) => b.id !== bkId) })); }
  function updateStats(matchId, field, value) { updateMatch(matchId, (m) => ({ ...m, stats: { ...m.stats, [field]: value } })); }
  function updateBank(matchId, field, value) { updateMatch(matchId, (m) => ({ ...m, bank: { ...m.bank, [field]: value } })); }

  async function fetchLiveOdds() {
    setLiveLoading(true); setLiveError(""); setLiveEvents([]);
    try {
      const r = await fetch(`/api/odds?sport=${encodeURIComponent(liveSport)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data?.error || `status ${r.status}`);
      setLiveEvents(data.events || []);
      setLiveMeta({ remaining: data.requestsRemaining, used: data.requestsUsed });
    } catch (e) {
      setLiveError(`Não foi possível buscar odds ao vivo (${e.message || "erro"}). Isso funciona apenas quando o site está publicado no Vercel com a variável ODDS_API_KEY configurada — não funciona abrindo o arquivo local.`);
    } finally {
      setLiveLoading(false);
    }
  }

  function applyLiveEvent(ev) {
    if (!activeMatch) return;
    const bookmakers = (ev.bookmakers || []).map((bm) => {
      const market = (bm.markets || []).find((mk) => mk.key === "h2h");
      if (!market) return null;
      let oddsHome = "", oddsDraw = "", oddsAway = "";
      market.outcomes.forEach((o) => {
        if (o.name === ev.home_team) oddsHome = String(o.price);
        else if (o.name === ev.away_team) oddsAway = String(o.price);
        else oddsDraw = String(o.price);
      });
      return { id: uid(), name: bm.title, oddsHome, oddsDraw, oddsAway };
    }).filter(Boolean);
    updateMatch(activeMatch.id, (m) => ({
      ...m,
      home: ev.home_team || m.home,
      away: ev.away_team || m.away,
      bookmakers: bookmakers.length ? bookmakers : m.bookmakers,
    }));
  }

  async function fetchStatsTeams(compCode) {
    setStatsTeamsLoading(true); setStatsTeamsError(""); setStatsTeams([]);
    try {
      const r = await fetch(`/api/stats?action=teams&comp=${encodeURIComponent(compCode)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data?.error || `status ${r.status}`);
      setStatsTeams(data.teams || []);
    } catch (e) {
      setStatsTeamsError(`Não foi possível carregar os times (${e.message || "erro"}). Isso só funciona quando o site está publicado no Vercel com FOOTBALL_DATA_API_KEY configurada.`);
    } finally {
      setStatsTeamsLoading(false);
    }
  }

  async function fetchTeamForm(teamId) {
    const r = await fetch(`/api/stats?action=team-form&teamId=${encodeURIComponent(teamId)}&matches=6`);
    const data = await r.json();
    if (!r.ok) throw new Error(data?.error || `status ${r.status}`);
    return data;
  }

  async function runAutoStats(matchId) {
    const m = matches.find((mm) => mm.id === matchId);
    if (!m || !m.stats.homeTeamId || !m.stats.awayTeamId) return;
    setStatsFormLoading(true); setStatsFormError(""); setStatsDetail(null);
    try {
      const [homeData, awayData] = await Promise.all([fetchTeamForm(m.stats.homeTeamId), fetchTeamForm(m.stats.awayTeamId)]);
      updateStats(matchId, "homeGF", homeData.avgScored != null ? String(homeData.avgScored) : "");
      updateStats(matchId, "homeGA", homeData.avgConceded != null ? String(homeData.avgConceded) : "");
      updateStats(matchId, "awayGF", awayData.avgScored != null ? String(awayData.avgScored) : "");
      updateStats(matchId, "awayGA", awayData.avgConceded != null ? String(awayData.avgConceded) : "");
      setStatsDetail({ home: homeData, away: awayData });
    } catch (e) {
      setStatsFormError(`Não foi possível buscar a forma recente (${e.message || "erro"}).`);
    } finally {
      setStatsFormLoading(false);
    }
  }

  const oddsBoard = useMemo(() => computeOddsBoard(activeMatch ? activeMatch.bookmakers : []), [activeMatch]);
  const marketFair = useMemo(() => marketFairProbs(oddsBoard.best), [oddsBoard]);

  const statsBoard = useMemo(() => {
    if (!activeMatch) return null;
    const s = activeMatch.stats;
    const gfH = parseFloat(s.homeGF), gaH = parseFloat(s.homeGA), gfA = parseFloat(s.awayGF), gaA = parseFloat(s.awayGA);
    const advH = parseFloat(s.homeAdv) || 1, advA = parseFloat(s.awayAdv) || 1;
    if ([gfH, gaH, gfA, gaA].some((v) => isNaN(v) || v < 0)) return null;
    const lambdaHome = ((gfH + gaA) / 2) * advH;
    const lambdaAway = ((gfA + gaH) / 2) * advA;
    const probs = computeOutcomeProbs(lambdaHome, lambdaAway);
    let edges = null;
    if (marketFair) edges = { home: probs.pHome - marketFair.home, draw: probs.pDraw - marketFair.draw, away: probs.pAway - marketFair.away };
    return { lambdaHome, lambdaAway, ...probs, edges };
  }, [activeMatch, marketFair]);

  async function runAi(matchId) {
    const m = matches.find((mm) => mm.id === matchId);
    if (!m || !apiKey.trim()) return;
    setAiLoading(true);
    setAiError("");
    try {
      const oddsSummary = oddsBoard.rows.map((r) => `${r.name}: casa ${isNaN(r.oh) ? "-" : r.oh}, empate ${isNaN(r.od) ? "-" : r.od}, fora ${isNaN(r.oa) ? "-" : r.oa}`).join(" | ") || "sem odds cadastradas";
      const statsSummary = statsBoard
        ? `Modelo Poisson -> casa ${pct(statsBoard.pHome)}, empate ${pct(statsBoard.pDraw)}, fora ${pct(statsBoard.pAway)}. Placares mais prováveis: ${statsBoard.top3.map((t) => `${t.h}-${t.a} (${pct(t.p)})`).join(", ")}.`
        : "sem estatísticas suficientes para o modelo.";
      const prompt = `Partida: ${m.home || "Time da casa"} x ${m.away || "Time visitante"}
Odds por casa de apostas: ${oddsSummary}
${statsSummary}
Contexto adicional informado pelo usuário: ${m.aiContext || "nenhum"}

Escreva uma análise curta e objetiva em português (Brasil), em texto corrido dividido em três partes claras: "Fatores-chave", "Riscos" e "Mercado a observar". Baseie-se apenas nos números fornecidos e no contexto dado. Não garanta resultados nem trate isso como certeza — trate como leitura probabilística de apoio à decisão.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-5",
          max_tokens: 1000,
          system: "Você é um analista de apostas esportivas experiente e cauteloso. Responda sempre em português do Brasil, de forma direta, sem floreios, e sem prometer resultados garantidos.",
          messages: [{ role: "user", content: prompt }],
        }),
      });
      if (!response.ok) {
        const errBody = await response.json().catch(() => null);
        throw new Error(errBody?.error?.message || `status ${response.status}`);
      }
      const data = await response.json();
      const text = (data.content || []).map((c) => c.text || "").filter(Boolean).join("\n");
      updateMatch(matchId, (mm) => ({ ...mm, aiAnalysis: text, aiTimestamp: Date.now() }));
    } catch (e) {
      setAiError(`Não foi possível concluir a análise (${e.message || "erro"}).`);
    } finally {
      setAiLoading(false);
    }
  }

  const chartData = statsBoard && marketFair
    ? [
        { name: `${activeMatch.home?.trim() || "Casa"} vence`, Modelo: +(statsBoard.pHome * 100).toFixed(1), Mercado: +(marketFair.home * 100).toFixed(1) },
        { name: "Empate", Modelo: +(statsBoard.pDraw * 100).toFixed(1), Mercado: +(marketFair.draw * 100).toFixed(1) },
        { name: `${activeMatch.away?.trim() || "Fora"} vence`, Modelo: +(statsBoard.pAway * 100).toFixed(1), Mercado: +(marketFair.away * 100).toFixed(1) },
      ]
    : null;

  const valueThreshold = activeMatch ? parseFloat(activeMatch.stats.valueThreshold) || 3 : 3;

  return (
    <div style={{ background: COLORS.bg, color: COLORS.ink, fontFamily: F_BODY, minHeight: "100vh", padding: 16 }}>
      <div style={{ maxWidth: 1180, margin: "0 auto 18px", display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontFamily: F_DISPLAY, fontSize: 30, letterSpacing: "0.03em", lineHeight: 1 }}>
            ODDS<span style={{ color: COLORS.pitch }}>ANALYZER</span> <span style={{ color: COLORS.gold }}>PRO</span>
          </div>
          <div style={{ fontSize: 12, color: COLORS.inkMute, fontFamily: F_MONO, marginTop: 2 }}>sala de análise — futebol</div>
        </div>
      </div>

      <div className="app-grid">
        <div>
          <button onClick={addMatch} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: COLORS.pitchDim, color: COLORS.ink, border: "none", borderRadius: 8, padding: "10px 12px", fontFamily: F_BODY, fontWeight: 600, fontSize: 13, cursor: "pointer", marginBottom: 10 }}>
            <Icon name="plus" size={16} /> Nova Partida
          </button>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {matches.length === 0 && loaded && <div style={{ fontSize: 12, color: COLORS.inkMute, padding: "8px 4px" }}>Nenhuma partida ainda.</div>}
            {matches.map((m) => (
              <div key={m.id} className="match-card" onClick={() => setActiveId(m.id)} style={{ background: COLORS.surface, border: `1px solid ${m.id === activeId ? COLORS.pitch : COLORS.line}`, borderRadius: 8, padding: "10px 10px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontFamily: F_MONO, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {m.home?.trim() || "Time A"} <span style={{ color: COLORS.inkMute }}>x</span> {m.away?.trim() || "Time B"}
                  </div>
                </div>
                <button className="icon-btn" onClick={(e) => { e.stopPropagation(); deleteMatch(m.id); }} title="Excluir partida"><Icon name="trash" size={14} /></button>
              </div>
            ))}
          </div>
        </div>

        <div>
          {!activeMatch ? (
            <div style={{ background: COLORS.surface, border: `1px dashed ${COLORS.line}`, borderRadius: 10, padding: 40, textAlign: "center", color: COLORS.inkMute }}>
              <Icon name="target" size={28} style={{ marginBottom: 10, color: COLORS.inkMute }} />
              <div style={{ fontFamily: F_DISPLAY, fontSize: 22, color: COLORS.ink, marginBottom: 4 }}>Nenhuma partida em análise</div>
              <div style={{ fontSize: 13, marginBottom: 16 }}>Crie a primeira partida para começar a comparar odds e estatísticas.</div>
              <button onClick={addMatch} style={{ background: COLORS.pitchDim, color: COLORS.ink, border: "none", borderRadius: 8, padding: "10px 18px", fontFamily: F_BODY, fontWeight: 600, cursor: "pointer" }}>+ Nova Partida</button>
            </div>
          ) : (
            <>
              <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14, marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                  <input value={activeMatch.home} onChange={(e) => updateMatch(activeMatch.id, (m) => ({ ...m, home: e.target.value }))} placeholder="TIME CASA" style={{ background: "transparent", border: "none", borderBottom: `2px solid ${COLORS.line}`, color: COLORS.ink, fontFamily: F_DISPLAY, fontSize: 24, letterSpacing: "0.03em", textTransform: "uppercase", padding: "4px 2px", flex: "1 1 160px", minWidth: 120 }} />
                  <span style={{ fontFamily: F_DISPLAY, fontSize: 22, color: COLORS.gold }}>×</span>
                  <input value={activeMatch.away} onChange={(e) => updateMatch(activeMatch.id, (m) => ({ ...m, away: e.target.value }))} placeholder="TIME VISITANTE" style={{ background: "transparent", border: "none", borderBottom: `2px solid ${COLORS.line}`, color: COLORS.ink, fontFamily: F_DISPLAY, fontSize: 24, letterSpacing: "0.03em", textTransform: "uppercase", padding: "4px 2px", flex: "1 1 160px", minWidth: 120 }} />
                </div>
                <div style={{ marginTop: 12 }}><OddsBoard match={activeMatch} oddsBoard={oddsBoard} /></div>
              </div>

              <div style={{ display: "flex", gap: 20, borderBottom: `1px solid ${COLORS.line}`, marginBottom: 14 }}>
                {TABS.map((t) => <button key={t.key} className={`tab-btn ${tab === t.key ? "active" : ""}`} onClick={() => setTab(t.key)}>{t.label}</button>)}
              </div>

              {tab === "odds" && (
                <OddsTab match={activeMatch} oddsBoard={oddsBoard}
                  onAddBookmaker={() => addBookmaker(activeMatch.id)}
                  onUpdateBookmaker={(bkId, field, val) => updateBookmaker(activeMatch.id, bkId, field, val)}
                  onDeleteBookmaker={(bkId) => deleteBookmaker(activeMatch.id, bkId)}
                  onUpdateStakePool={(val) => updateMatch(activeMatch.id, (m) => ({ ...m, stakePool: val }))}
                  liveSport={liveSport} setLiveSport={setLiveSport}
                  liveEvents={liveEvents} liveLoading={liveLoading} liveError={liveError} liveMeta={liveMeta}
                  onFetchLive={fetchLiveOdds} onApplyEvent={applyLiveEvent} />
              )}
              {tab === "stats" && (
                <StatsTab match={activeMatch} statsBoard={statsBoard} marketFair={marketFair} chartData={chartData} valueThreshold={valueThreshold} oddsBoard={oddsBoard}
                  onUpdateStats={(field, val) => updateStats(activeMatch.id, field, val)}
                  statsTeams={statsTeams} statsTeamsLoading={statsTeamsLoading} statsTeamsError={statsTeamsError}
                  statsFormLoading={statsFormLoading} statsFormError={statsFormError} statsDetail={statsDetail}
                  onFetchTeams={(compCode) => fetchStatsTeams(compCode)}
                  onRunAutoStats={() => runAutoStats(activeMatch.id)} />
              )}
              {tab === "bank" && (
                <BankTab match={activeMatch} oddsBoard={oddsBoard} statsBoard={statsBoard}
                  onUpdateBank={(field, val) => updateBank(activeMatch.id, field, val)} />
              )}
              {tab === "ai" && (
                <AiTab match={activeMatch} apiKey={apiKey} onSaveApiKey={saveApiKey} aiLoading={aiLoading} aiError={aiError}
                  onUpdateContext={(val) => updateMatch(activeMatch.id, (m) => ({ ...m, aiContext: val }))}
                  onRun={() => runAi(activeMatch.id)} />
              )}
            </>
          )}
        </div>
      </div>

      <div style={{ maxWidth: 1180, margin: "24px auto 0", textAlign: "center", fontSize: 11, color: COLORS.inkMute, fontFamily: F_BODY }}>
        Ferramenta de apoio à decisão. Não garante resultados. Aposte com responsabilidade.
        Partidas salvas apenas neste navegador (localStorage). Busca automática de odds e estatísticas requer publicação no Vercel.
      </div>
    </div>
  );
}

function OddsTab({ match, oddsBoard, onAddBookmaker, onUpdateBookmaker, onDeleteBookmaker, onUpdateStakePool, liveSport, setLiveSport, liveEvents, liveLoading, liveError, liveMeta, onFetchLive, onApplyEvent }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>ODDS AO VIVO</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <Field label="Competição">
            <select value={liveSport} onChange={(e) => setLiveSport(e.target.value)} style={{ ...inputStyle, fontFamily: F_BODY, minWidth: 200 }}>
              {COMPETITIONS.map((c) => <option key={c.key} value={c.key}>{c.label}</option>)}
            </select>
          </Field>
          <button onClick={onFetchLive} disabled={liveLoading} style={{ display: "flex", alignItems: "center", gap: 6, background: liveLoading ? COLORS.surface2 : COLORS.pitchDim, color: COLORS.ink, border: "none", borderRadius: 8, padding: "9px 14px", fontFamily: F_BODY, fontWeight: 600, fontSize: 13, cursor: liveLoading ? "default" : "pointer" }}>
            {liveLoading ? <Icon name="loader" size={16} style={{ animation: "spin 1s linear infinite" }} /> : <Icon name="sparkles" size={16} />}
            {liveLoading ? "Buscando..." : "Buscar jogos"}
          </button>
          {liveMeta?.remaining && <span style={{ fontSize: 11, color: COLORS.inkMute, fontFamily: F_MONO }}>{liveMeta.remaining} consultas restantes no mês</span>}
        </div>
        {liveError && <div style={{ color: COLORS.alert, fontSize: 12, marginTop: 10 }}>{liveError}</div>}
        {!liveLoading && !liveError && liveEvents.length === 0 && (
          <div style={{ fontSize: 12, color: COLORS.inkMute, marginTop: 10 }}>Nenhuma busca feita ainda. Isso só funciona quando o site está publicado no Vercel (veja instruções de deploy).</div>
        )}
        {liveEvents.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 12 }}>
            {liveEvents.map((ev) => (
              <div key={ev.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, background: COLORS.bg, border: `1px solid ${COLORS.line}`, borderRadius: 6, padding: "8px 10px", flexWrap: "wrap" }}>
                <div style={{ fontFamily: F_MONO, fontSize: 13 }}>
                  {ev.home_team} <span style={{ color: COLORS.inkMute }}>x</span> {ev.away_team}
                  <span style={{ color: COLORS.inkMute, fontSize: 11, marginLeft: 8 }}>{ev.commence_time ? new Date(ev.commence_time).toLocaleString("pt-BR") : ""}</span>
                </div>
                <button onClick={() => onApplyEvent(ev)} style={{ background: COLORS.surface2, color: COLORS.gold, border: `1px solid ${COLORS.goldDim}`, borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}>Usar esta partida</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em" }}>CASAS DE APOSTAS</div>
          <button onClick={onAddBookmaker} style={{ display: "flex", alignItems: "center", gap: 4, background: COLORS.surface2, color: COLORS.ink, border: `1px solid ${COLORS.line}`, borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}><Icon name="plus" size={14} /> Adicionar casa</button>
        </div>
        <table className="data-table">
          <thead><tr><th>Casa de apostas</th><th>Casa (1)</th><th>Empate (X)</th><th>Fora (2)</th><th>Sobre-round</th><th></th></tr></thead>
          <tbody>
            {match.bookmakers.map((b) => {
              const row = oddsBoard.rows.find((r) => r.id === b.id);
              return (
                <tr key={b.id}>
                  <td style={{ minWidth: 130 }}><TextInput value={b.name} onChange={(e) => onUpdateBookmaker(b.id, "name", e.target.value)} placeholder="Nome da casa" style={{ padding: "6px 8px", fontSize: 13 }} /></td>
                  <td><NumInput value={b.oddsHome} onChange={(e) => onUpdateBookmaker(b.id, "oddsHome", e.target.value)} placeholder="0.00" style={{ padding: "6px 8px", fontSize: 13, width: 80, borderColor: oddsBoard.best.home?.bookmaker === b.name && b.name.trim() ? COLORS.gold : COLORS.line }} /></td>
                  <td><NumInput value={b.oddsDraw} onChange={(e) => onUpdateBookmaker(b.id, "oddsDraw", e.target.value)} placeholder="0.00" style={{ padding: "6px 8px", fontSize: 13, width: 80, borderColor: oddsBoard.best.draw?.bookmaker === b.name && b.name.trim() ? COLORS.gold : COLORS.line }} /></td>
                  <td><NumInput value={b.oddsAway} onChange={(e) => onUpdateBookmaker(b.id, "oddsAway", e.target.value)} placeholder="0.00" style={{ padding: "6px 8px", fontSize: 13, width: 80, borderColor: oddsBoard.best.away?.bookmaker === b.name && b.name.trim() ? COLORS.gold : COLORS.line }} /></td>
                  <td style={{ color: row?.overround != null ? (row.overround > 8 ? COLORS.alert : COLORS.inkMute) : COLORS.inkMute }}>{row?.overround != null ? pctRaw(row.overround, 2) : "—"}</td>
                  <td><button className="icon-btn" onClick={() => onDeleteBookmaker(b.id)}><Icon name="trash" size={14} /></button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{ fontSize: 11, color: COLORS.inkMute, marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}><Icon name="info" size={12} /> Odds destacadas em dourado são a melhor odd disponível para aquele resultado.</div>
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>ARBITRAGEM (SUREBET)</div>
        {!oddsBoard.arbitrage ? (
          <div style={{ fontSize: 13, color: COLORS.inkMute }}>Preencha odds válidas para casa, empate e fora em ao menos uma casa cada para checar arbitragem.</div>
        ) : oddsBoard.arbitrage.isArb ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Badge tone="gold"><Icon name="trendUp" size={12} /> lucro garantido {oddsBoard.arbitrage.profitPct.toFixed(2)}%</Badge></div>
            <Field label="Total a distribuir (R$)"><NumInput value={match.stakePool} onChange={(e) => onUpdateStakePool(e.target.value)} style={{ maxWidth: 180 }} /></Field>
            <table className="data-table">
              <thead><tr><th>Resultado</th><th>Casa</th><th>Odd</th><th>Stake</th></tr></thead>
              <tbody>
                {[{ key: "home", label: match.home?.trim() || "Casa" }, { key: "draw", label: "Empate" }, { key: "away", label: match.away?.trim() || "Fora" }].map((o) => (
                  <tr key={o.key}><td>{o.label}</td><td>{oddsBoard.best[o.key].bookmaker}</td><td>{oddsBoard.best[o.key].value.toFixed(2)}</td><td>{money((parseFloat(match.stakePool) || 0) * oddsBoard.arbitrage.alloc[o.key])}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : (
          <div style={{ fontSize: 13, color: COLORS.inkMute }}>Sem oportunidade de arbitragem no momento (soma das probabilidades implícitas das melhores odds: {pctRaw(oddsBoard.arbitrage.sumInv * 100, 2)}).</div>
        )}
      </div>
    </div>
  );
}

function StatsTab({ match, statsBoard, marketFair, chartData, valueThreshold, oddsBoard, onUpdateStats, statsTeams, statsTeamsLoading, statsTeamsError, statsFormLoading, statsFormError, statsDetail, onFetchTeams, onRunAutoStats }) {
  const s = match.stats;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>ESTATÍSTICAS AUTOMÁTICAS</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <Field label="Competição">
            <select
              value={s.compCode}
              onChange={(e) => { onUpdateStats("compCode", e.target.value); onUpdateStats("homeTeamId", ""); onUpdateStats("awayTeamId", ""); }}
              style={{ ...inputStyle, fontFamily: F_BODY, minWidth: 190 }}
            >
              {STATS_COMPETITIONS.map((c) => <option key={c.code} value={c.code}>{c.label}</option>)}
            </select>
          </Field>
          <button onClick={() => onFetchTeams(s.compCode)} disabled={statsTeamsLoading} style={{ display: "flex", alignItems: "center", gap: 6, background: statsTeamsLoading ? COLORS.surface2 : COLORS.surface2, color: COLORS.ink, border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: "9px 14px", fontFamily: F_BODY, fontWeight: 600, fontSize: 13, cursor: statsTeamsLoading ? "default" : "pointer" }}>
            {statsTeamsLoading ? <Icon name="loader" size={16} style={{ animation: "spin 1s linear infinite" }} /> : null}
            {statsTeamsLoading ? "Carregando..." : "Carregar times"}
          </button>
        </div>
        {statsTeamsError && <div style={{ color: COLORS.alert, fontSize: 12, marginTop: 10 }}>{statsTeamsError}</div>}

        {statsTeams.length > 0 && (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 12, alignItems: "flex-end" }}>
            <Field label="Time da casa">
              <select value={s.homeTeamId} onChange={(e) => onUpdateStats("homeTeamId", e.target.value)} style={{ ...inputStyle, fontFamily: F_BODY, minWidth: 190 }}>
                <option value="">selecione...</option>
                {statsTeams.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </Field>
            <Field label="Time visitante">
              <select value={s.awayTeamId} onChange={(e) => onUpdateStats("awayTeamId", e.target.value)} style={{ ...inputStyle, fontFamily: F_BODY, minWidth: 190 }}>
                <option value="">selecione...</option>
                {statsTeams.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </Field>
            <button onClick={onRunAutoStats} disabled={statsFormLoading || !s.homeTeamId || !s.awayTeamId} style={{ display: "flex", alignItems: "center", gap: 6, background: statsFormLoading || !s.homeTeamId || !s.awayTeamId ? COLORS.surface2 : COLORS.pitchDim, color: COLORS.ink, border: "none", borderRadius: 8, padding: "9px 14px", fontFamily: F_BODY, fontWeight: 600, fontSize: 13, cursor: statsFormLoading || !s.homeTeamId || !s.awayTeamId ? "default" : "pointer" }}>
              {statsFormLoading ? <Icon name="loader" size={16} style={{ animation: "spin 1s linear infinite" }} /> : <Icon name="sparkles" size={16} />}
              {statsFormLoading ? "Buscando..." : "Buscar forma automaticamente"}
            </button>
          </div>
        )}
        {statsFormError && <div style={{ color: COLORS.alert, fontSize: 12, marginTop: 10 }}>{statsFormError}</div>}
        {!statsTeamsLoading && statsTeams.length === 0 && !statsTeamsError && (
          <div style={{ fontSize: 12, color: COLORS.inkMute, marginTop: 10 }}>Clique em "Carregar times" pra listar os clubes da competição. Só funciona publicado no Vercel (veja instruções de deploy).</div>
        )}

        {statsDetail && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12, marginTop: 14 }}>
            {[["home", match.home?.trim() || "Casa"], ["away", match.away?.trim() || "Fora"]].map(([key, label]) => (
              <div key={key} style={{ background: COLORS.bg, border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: 10 }}>
                <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.05em", color: COLORS.inkMute, marginBottom: 6 }}>{label} · últimos {statsDetail[key].matchesUsed} jogos</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  {statsDetail[key].detail.map((d, i) => (
                    <div key={i} style={{ fontFamily: F_MONO, fontSize: 11, color: COLORS.inkMute, display: "flex", justifyContent: "space-between" }}>
                      <span>vs {d.opponent} ({d.venue})</span><span style={{ color: COLORS.ink }}>{d.gf}-{d.ga}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>MÉDIAS DE GOLS (ÚLTIMOS JOGOS)</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
          <Field label={`${match.home?.trim() || "Casa"} — marcados`}><NumInput value={s.homeGF} onChange={(e) => onUpdateStats("homeGF", e.target.value)} placeholder="ex: 1.8" /></Field>
          <Field label={`${match.home?.trim() || "Casa"} — sofridos`}><NumInput value={s.homeGA} onChange={(e) => onUpdateStats("homeGA", e.target.value)} placeholder="ex: 1.1" /></Field>
          <Field label={`${match.away?.trim() || "Fora"} — marcados`}><NumInput value={s.awayGF} onChange={(e) => onUpdateStats("awayGF", e.target.value)} placeholder="ex: 1.3" /></Field>
          <Field label={`${match.away?.trim() || "Fora"} — sofridos`}><NumInput value={s.awayGA} onChange={(e) => onUpdateStats("awayGA", e.target.value)} placeholder="ex: 1.4" /></Field>
          <Field label="Fator vantagem casa"><NumInput value={s.homeAdv} onChange={(e) => onUpdateStats("homeAdv", e.target.value)} /></Field>
          <Field label="Fator visitante"><NumInput value={s.awayAdv} onChange={(e) => onUpdateStats("awayAdv", e.target.value)} /></Field>
          <Field label="Limiar de valor (%)"><NumInput value={s.valueThreshold} onChange={(e) => onUpdateStats("valueThreshold", e.target.value)} /></Field>
        </div>
        <div style={{ fontSize: 11, color: COLORS.inkMute, marginTop: 10, display: "flex", alignItems: "center", gap: 6 }}><Icon name="info" size={12} /> Modelo de Poisson: λ casa = média(marcados casa, sofridos fora) × fator casa. λ fora = média(marcados fora, sofridos casa) × fator visitante.</div>
      </div>

      {!statsBoard ? (
        <div style={{ background: COLORS.surface, border: `1px dashed ${COLORS.line}`, borderRadius: 10, padding: 20, textAlign: "center", color: COLORS.inkMute, fontSize: 13 }}>Preencha as médias de gols acima para gerar o modelo de probabilidades.</div>
      ) : (
        <>
          <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
            <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>PROBABILIDADES DO MODELO</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>
              <DigitCell label={match.home?.trim() || "Casa"} value={pct(statsBoard.pHome)} tone="pitch" />
              <DigitCell label="Empate" value={pct(statsBoard.pDraw)} />
              <DigitCell label={match.away?.trim() || "Fora"} value={pct(statsBoard.pAway)} tone="pitch" />
              <DigitCell label="λ casa / λ fora" value={`${statsBoard.lambdaHome.toFixed(2)} / ${statsBoard.lambdaAway.toFixed(2)}`} />
            </div>
            <div style={{ fontFamily: F_BODY, fontSize: 12, color: COLORS.inkMute, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Placares mais prováveis</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {statsBoard.top3.map((t, i) => <Badge key={i} tone={i === 0 ? "gold" : "mute"}>{t.h}–{t.a} · {pct(t.p)}</Badge>)}
            </div>
          </div>

          {chartData && (
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
              <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 14 }}>MODELO × MERCADO</div>
              <CompareBars data={chartData} />
              <div style={{ marginTop: 16 }}>
                <table className="data-table">
                  <thead><tr><th>Resultado</th><th>Modelo</th><th>Mercado (justo)</th><th>Edge</th><th></th></tr></thead>
                  <tbody>
                    {[{ key: "home", label: match.home?.trim() || "Casa", modelP: statsBoard.pHome }, { key: "draw", label: "Empate", modelP: statsBoard.pDraw }, { key: "away", label: match.away?.trim() || "Fora", modelP: statsBoard.pAway }].map((o) => {
                      const edge = statsBoard.edges ? statsBoard.edges[o.key] * 100 : null;
                      const isValue = edge !== null && edge >= valueThreshold;
                      return (
                        <tr key={o.key}>
                          <td>{o.label}</td><td>{pct(o.modelP)}</td><td>{marketFair ? pct(marketFair[o.key]) : "—"}</td>
                          <td style={{ color: edge === null ? COLORS.inkMute : edge >= 0 ? COLORS.pitch : COLORS.alert }}>{edge === null ? "—" : `${edge >= 0 ? "+" : ""}${edge.toFixed(1)}pp`}</td>
                          <td>{isValue && <Badge tone="gold">valor · {oddsBoard.best[o.key]?.bookmaker}</Badge>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function BankTab({ match, oddsBoard, statsBoard, onUpdateBank }) {
  const b = match.bank;
  const outcomeOdds = oddsBoard.best[b.selectedOutcome]?.value || null;
  const outcomeModelProb = statsBoard ? { home: statsBoard.pHome, draw: statsBoard.pDraw, away: statsBoard.pAway }[b.selectedOutcome] : null;
  const bankroll = parseFloat(b.bankroll) || 0;
  const fraction = parseFloat(b.kellyFraction) || 0;
  const flatPct = parseFloat(b.flatPercent) || 0;
  const kelly = outcomeOdds && outcomeModelProb ? kellyStake(bankroll, outcomeOdds, outcomeModelProb, fraction) : null;
  const flatStake = bankroll * (flatPct / 100);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>GESTÃO DE BANCA</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 10 }}>
          <Field label="Banca total (R$)"><NumInput value={b.bankroll} onChange={(e) => onUpdateBank("bankroll", e.target.value)} /></Field>
          <Field label="Resultado a apostar">
            <select value={b.selectedOutcome} onChange={(e) => onUpdateBank("selectedOutcome", e.target.value)} style={{ ...inputStyle, fontFamily: F_BODY }}>
              <option value="home">{match.home?.trim() || "Casa"}</option>
              <option value="draw">Empate</option>
              <option value="away">{match.away?.trim() || "Fora"}</option>
            </select>
          </Field>
          <Field label="Fração de Kelly">
            <select value={b.kellyFraction} onChange={(e) => onUpdateBank("kellyFraction", e.target.value)} style={{ ...inputStyle, fontFamily: F_BODY }}>
              <option value="1">Kelly total</option><option value="0.5">Meio Kelly</option><option value="0.25">Quarto de Kelly</option>
            </select>
          </Field>
          <Field label="Aposta fixa (%)"><NumInput value={b.flatPercent} onChange={(e) => onUpdateBank("flatPercent", e.target.value)} /></Field>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14 }}>
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}><Icon name="wallet" size={16} color={COLORS.gold} /><div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em" }}>KELLY</div></div>
          {!outcomeOdds || !outcomeModelProb ? (
            <div style={{ fontSize: 13, color: COLORS.inkMute }}>Preencha a odd do resultado escolhido na aba Odds e as médias de gols na aba Estatísticas.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ fontSize: 12, color: COLORS.inkMute }}>Odd usada: <span style={{ color: COLORS.ink, fontFamily: F_MONO }}>{outcomeOdds.toFixed(2)}</span> · Prob. modelo: <span style={{ color: COLORS.ink, fontFamily: F_MONO }}>{pct(outcomeModelProb)}</span></div>
              {kelly.fstar <= 0 ? (
                <Badge tone="alert"><Icon name="alert" size={12} /> sem vantagem — Kelly não recomenda aposta</Badge>
              ) : (
                <>
                  <Badge tone="pitch"><Icon name="trendUp" size={12} /> vantagem estimada {pct(kelly.fstar)}</Badge>
                  <div style={{ fontFamily: F_MONO, fontSize: 26, color: COLORS.gold }}>{money(kelly.stake)}</div>
                  <div style={{ fontSize: 11, color: COLORS.inkMute }}>stake sugerida ({fraction === 1 ? "Kelly total" : fraction === 0.5 ? "meio Kelly" : "quarto de Kelly"})</div>
                </>
              )}
            </div>
          )}
        </div>

        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}><Icon name="chart" size={16} color={COLORS.pitch} /><div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em" }}>APOSTA FIXA</div></div>
          <div style={{ fontSize: 12, color: COLORS.inkMute, marginBottom: 8 }}>{flatPct}% da banca de {money(bankroll)}</div>
          <div style={{ fontFamily: F_MONO, fontSize: 26, color: COLORS.ink }}>{money(flatStake)}</div>
          <div style={{ fontSize: 11, color: COLORS.inkMute, marginTop: 4 }}>stake fixa, independente do edge calculado</div>
        </div>
      </div>
    </div>
  );
}

function AiTab({ match, apiKey, onSaveApiKey, aiLoading, aiError, onUpdateContext, onRun }) {
  const [showKey, setShowKey] = useState(false);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>CHAVE DE API (ANTHROPIC)</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <Field label="Sua chave (sk-ant-...)">
            <input type={showKey ? "text" : "password"} value={apiKey} onChange={(e) => onSaveApiKey(e.target.value)} placeholder="sk-ant-..." style={{ ...inputStyle, minWidth: 260 }} />
          </Field>
          <button onClick={() => setShowKey((v) => !v)} style={{ background: COLORS.surface2, color: COLORS.ink, border: `1px solid ${COLORS.line}`, borderRadius: 6, padding: "8px 12px", fontSize: 12, cursor: "pointer" }}>{showKey ? "ocultar" : "mostrar"}</button>
        </div>
        <div style={{ fontSize: 11, color: COLORS.inkMute, marginTop: 8, display: "flex", alignItems: "flex-start", gap: 6 }}>
          <Icon name="info" size={12} style={{ marginTop: 2, flexShrink: 0 }} />
          <span>A chave fica salva só neste navegador (localStorage) e é usada apenas para chamar a API da Anthropic diretamente do seu computador — nenhum servidor intermediário vê essa chave. Gere uma em console.anthropic.com.</span>
        </div>
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 14 }}>
        <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", marginBottom: 10 }}>CONTEXTO ADICIONAL</div>
        <textarea value={match.aiContext} onChange={(e) => onUpdateContext(e.target.value)} placeholder="Lesões, desfalques, notícias recentes, motivação, clima, etc. (opcional)" rows={4} style={{ ...inputStyle, fontFamily: F_BODY, resize: "vertical" }} />
        <button onClick={onRun} disabled={aiLoading || !apiKey.trim()} style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 6, background: aiLoading || !apiKey.trim() ? COLORS.surface2 : COLORS.pitchDim, color: COLORS.ink, border: "none", borderRadius: 8, padding: "10px 16px", fontFamily: F_BODY, fontWeight: 600, fontSize: 13, cursor: aiLoading || !apiKey.trim() ? "default" : "pointer" }}>
          {aiLoading ? <Icon name="loader" size={16} style={{ animation: "spin 1s linear infinite" }} /> : <Icon name="sparkles" size={16} />}
          {aiLoading ? "Analisando..." : "Analisar com IA"}
        </button>
        {!apiKey.trim() && <div style={{ fontSize: 12, color: COLORS.inkMute, marginTop: 8 }}>Adicione sua chave de API acima para usar a análise.</div>}
        {aiError && <div style={{ color: COLORS.alert, fontSize: 12, marginTop: 8 }}>{aiError}</div>}
      </div>

      {match.aiAnalysis && (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontFamily: F_DISPLAY, fontSize: 18, letterSpacing: "0.03em", display: "flex", alignItems: "center", gap: 6 }}><Icon name="sparkles" size={16} color={COLORS.gold} /> RELATÓRIO</div>
            {match.aiTimestamp && <span style={{ fontSize: 11, color: COLORS.inkMute, fontFamily: F_MONO }}>{new Date(match.aiTimestamp).toLocaleString("pt-BR")}</span>}
          </div>
          <div style={{ whiteSpace: "pre-wrap", fontSize: 14, lineHeight: 1.6, color: COLORS.ink, fontFamily: F_BODY }}>{match.aiAnalysis}</div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<OddsAnalyzerPro />);
</script>
</body>
</html>
